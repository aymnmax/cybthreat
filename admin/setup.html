<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup Account — Cybthreat</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    /* Using your existing design system from admin/index.html */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c10;--surface:#161b24;--border2:rgba(255,255,255,0.12);
      --text:#e8eaf0;--text2:#8b93a8;--accent:#00e5a0;--accent2:#00ffb3;
      --red:#ff4d4d;--red-bg:rgba(255,77,77,0.1);
      --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;--r:8px;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    
    .login-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:40px;width:100%;max-width:380px;display:none;}
    .login-logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:20px;letter-spacing:-.03em;margin-bottom:28px;justify-content:center}
    .login-logo svg{color:var(--accent)}
    .login-title{font-size:18px;font-weight:800;margin-bottom:6px;text-align:center}
    .login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;font-family:var(--mono)}
    
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
    .field label{font-size:12px;font-weight:700;color:var(--text2)}
    .input{background:#141720;border:1px solid var(--border2);border-radius:var(--r);padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%}
    .input:focus{border-color:rgba(0,229,160,.4)}
    
    .btn{display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;padding:11px 18px;border-radius:var(--r);border:none;cursor:pointer;background:var(--accent);color:#001a0e;width:100%;transition:0.2s}
    .btn:hover{background:var(--accent2)}
    .btn:disabled{opacity:0.5;cursor:not-allowed}

    #loadingScreen{text-align:center;font-family:var(--mono);color:var(--text2);font-size:14px}
    .error-box{background:var(--red-bg);color:var(--red);padding:12px;border-radius:var(--r);font-size:12px;font-family:var(--mono);margin-bottom:16px;display:none;border:1px solid rgba(255,77,77,0.2)}
  </style>
</head>
<body>

<div id="loadingScreen">Verifying invitation token...</div>

<div class="login-card" id="setupCard">
  <div class="login-logo">
    <svg width="24" height="24" viewBox="0 0 26 26" fill="none"><path d="M13 2L3 6v7c0 5.5 4.3 10.7 10 12 5.7-1.3 10-6.5 10-12V6L13 2z" stroke="currentColor" stroke-width="1.6" fill="rgba(0,229,160,0.08)"/><path d="M9 13l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Cybthreat
  </div>
  <div class="login-title">Activate Admin</div>
  <div class="login-sub">Set a password to complete registration</div>

  <div class="error-box" id="errorMsg"></div>

  <div class="field">
    <label>New Password</label>
    <input class="input" type="password" id="pass1" placeholder="••••••••"/>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input class="input" type="password" id="pass2" placeholder="••••••••"/>
  </div>

  <button class="btn" onclick="handleSetup()" id="setupBtn">Activate Account</button>
</div>

<script>
  const SB = supabase.createClient('https://ylidxkzjoneekstobaka.supabase.co', 'sb_publishable_4NuDJYNw0PBplKmaOyIFlw_eF4j2cc6');

  // Detect session from invite link automatically
  SB.auth.onAuthStateChanged((event, session) => {
    if (session) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('setupCard').style.display = 'block';
    } else {
      document.getElementById('loadingScreen').textContent = "Invalid or expired invitation link.";
    }
  });

  async function handleSetup() {
    const p1 = document.getElementById('pass1').value;
    const p2 = document.getElementById('pass2').value;
    const btn = document.getElementById('setupBtn');
    const err = document.getElementById('errorMsg');

    if (p1 !== p2) {
      err.textContent = "Passwords do not match.";
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = "Activating...";

    const { error } = await SB.auth.updateUser({ password: p1 });

    if (error) {
      err.textContent = error.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = "Activate Account";
    } else {
      alert("Account activated! You can now log in.");
      window.location.href = 'index.html'; // Goes back to admin login
    }
  }
</script>
</body>
</html>
